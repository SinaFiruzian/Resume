<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سینا فیروزیان | رزومه</title>
    <meta name="description"
        content="رزومه رسمی سینا فیروزیان؛ معرفی سوابق کاری، مهارت‌ها، پروژه‌ها و راه‌های ارتباطی.">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: #f7f6f3;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #e9e7e2;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 26px;
            font-weight: 700;
            color: #666;
            border: 1px solid #ddd;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 0.4rem;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 0.3rem;
        }

        .hint {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 2.5rem;
        }

        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 2rem;
        }

        .card {
            background: #fff;
            border: 1px solid #e0ddd8;
            border-radius: 35px;
            padding: 1.5rem 1rem;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: border-color 0.15s, transform 0.1s;
            position: relative;
        }

        .card:hover {
            border-color: #b0aaa0;
            transform: translateY(-10px);
        }

        .card.featured {
            border: 2px solid #3b82f6;
        }

        .badge {
            position: absolute;
            top: -10px;
            right: 14px;
            background: #eff6ff;
            color: #1d4ed8;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid #bfdbfe;
        }

        .card-icon {
            font-size: 28px;
            margin-bottom: 10px;
            display: block;
        }

        .card-title {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .card-desc {
            font-size: 12px;
            color: #888;
            line-height: 1.6;
        }

        .links {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .links a {
            font-size: 13px;
            color: #aaa;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.15s;
        }

        .links a:hover {
            color: #555;
        }

        .links svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        @media (max-width: 360px) {
            .cards {
                grid-template-columns: 1fr;
            }
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #141414;
                color: #f0ede8;
            }

            .avatar {
                background: #2a2a2a;
                border-color: #333;
                color: #999;
            }

            .subtitle {
                color: #999;
            }

            .hint {
                color: #555;
            }

            .card {
                background: #1e1e1e;
                border-color: #2e2e2e;
            }

            .card:hover {
                border-color: #555;
            }

            .card.featured {
                border-color: #3b82f6;
            }

            .badge {
                background: #1e3a5f;
                color: #93c5fd;
                border-color: #2563eb;
            }

            .card-desc {
                color: #777;
            }

            .links a {
                color: #555;
            }

            .links a:hover {
                color: #aaa;
            }
        }
    </style>
</head>

<body>
